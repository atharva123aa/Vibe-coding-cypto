<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrade Terminal Pro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0e11;
            --panel-bg: #181a20;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --accent-green: #0ecb81;
            --accent-red: #f6465d;
            --border-color: #2b3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .mono-num {
            font-family: 'JetBrains Mono', monospace;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }

        .logo h2 {
            margin-bottom: 40px;
            font-size: 24px;
            color: #fcd535;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-links li:hover,
        .nav-links li.active {
            background-color: #2b3139;
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .wallet-widget {
            text-align: right;
        }

        .wallet-widget span {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wallet-widget h2 {
            color: var(--text-main);
            font-size: 32px;
            margin-top: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-2px);
        }

        .panel h3 {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* HOUR 12 CSS: The Net Worth Badge */
        .net-worth-badge {
            float: right;
            color: #fcd535;
            font-size: 18px;
            background: rgba(252, 213, 53, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .coin-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .coin-price {
            font-size: 18px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .price-up {
            color: var(--accent-green) !important;
            text-shadow: 0 0 8px rgba(14, 203, 129, 0.3);
        }

        .price-down {
            color: var(--accent-red) !important;
            text-shadow: 0 0 8px rgba(246, 70, 93, 0.3);
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-buy {
            background: var(--accent-green);
            color: #000;
            margin-right: 8px;
        }

        .btn-sell {
            background: var(--accent-red);
            color: #fff;
        }

        .portfolio-item {
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .portfolio-item:last-child {
            border-bottom: none;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 13px;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #3a414a;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-track {
            background: var(--panel-bg);
        }

        .log-entry {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-buy {
            color: var(--accent-green);
            font-weight: bold;
        }

        .log-sell {
            color: var(--accent-red);
            font-weight: bold;
        }

        .log-time {
            color: var(--text-muted);
            font-size: 11px;
            background: #0b0e11;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>⚡ VibeTrade</h2>
            </div>
            <ul class="nav-links">
                <li class="active">📊 Market Data</li>
                <li>💼 Spot Wallet</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="greeting">
                    <h1 style="font-size: 22px;">Terminal Overview</h1>
                    <p style="color: var(--accent-green); font-size: 14px; margin-top: 5px;">● Live Market Feed</p>
                </div>
                <div class="wallet-widget">
                    <span>Available USD</span>
                    <h2 id="usd-balance" class="mono-num">$0.00</h2>
                </div>
            </header>
            <section class="dashboard-grid">
                <div class="panel">
                    <h3>Live Markets</h3>
                    <div id="coin-list"></div>
                </div>
                <div class="right-col">
                    <div class="panel">
                        <h3>Spot Portfolio 🎒 <span id="net-worth-display" class="net-worth-badge mono-num">$0.00</span>
                        </h3>
                        <div id="my-crypto-list" class="mono-num"></div>
                    </div>
                    <div class="panel">
                        <h3>Recent Activity 📜</h3>
                        <div id="history-display" class="history-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const coins = [
            { id: 'BTC', name: 'Bitcoin', price: 62000.50, icon: '₿' },
            { id: 'ETH', name: 'Ethereum', price: 3400.25, icon: '♦' },
            { id: 'SOL', name: 'Solana', price: 145.80, icon: '☀️' },
            { id: 'DOGE', name: 'Dogecoin', price: 0.15, icon: '🐕' }
        ];

        let userBalance = parseFloat(localStorage.getItem('vibeBalance')) || 10000.00;
        let myPortfolio = JSON.parse(localStorage.getItem('vibePortfolio')) || { BTC: 0, ETH: 0, SOL: 0, DOGE: 0 };
        let tradeHistory = JSON.parse(localStorage.getItem('vibeHistory')) || [];

        function updateTopUI() {
            document.getElementById('usd-balance').innerText = "$" + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // --- HOUR 12 LOGIC: Net Worth Calculator ---
        function updateNetWorth() {
            let totalCryptoValue = 0;
            for (const [coinId, amount] of Object.entries(myPortfolio)) {
                let currentCoin = coins.find(c => c.id === coinId);
                if (currentCoin && amount > 0) {
                    totalCryptoValue += (amount * currentCoin.price);
                }
            }
            let netWorth = userBalance + totalCryptoValue;
            document.getElementById('net-worth-display').innerText = "$" + netWorth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function addToHistory(type, amount, coinId, price) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            const entry = { type: type, amount: amount, coin: coinId, price: price, time: timeStr };
            tradeHistory.unshift(entry);
            if (tradeHistory.length > 30) tradeHistory.pop();
            saveData();
            renderHistory();
        }

        function buyCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let spendAmount = prompt(`How much USD do you want to spend on ${targetCoin.name} at $${targetCoin.price.toFixed(2)}?`);
            spendAmount = parseFloat(spendAmount);
            if (isNaN(spendAmount) || spendAmount <= 0 || spendAmount > userBalance) return alert("Invalid Trade.");

            let cryptoReceived = spendAmount / targetCoin.price;
            userBalance -= spendAmount;
            myPortfolio[coinId] += cryptoReceived;

            addToHistory("BUY", cryptoReceived, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
            updateNetWorth(); // update after buy
        }

        function sellCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let currentBag = myPortfolio[coinId].toFixed(4);
            let sellAmount = prompt(`Selling ${targetCoin.id} at $${targetCoin.price.toFixed(2)}.\nYou own ${currentBag}. How much to sell?`);
            sellAmount = parseFloat(sellAmount);
            if (isNaN(sellAmount) || sellAmount <= 0 || sellAmount > myPortfolio[coinId]) return alert("Invalid Trade.");

            let usdGained = sellAmount * targetCoin.price;
            userBalance += usdGained;
            myPortfolio[coinId] -= sellAmount;

            addToHistory("SELL", sellAmount, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
            updateNetWorth(); // update after sell
        }

        function saveData() {
            localStorage.setItem('vibeBalance', userBalance);
            localStorage.setItem('vibePortfolio', JSON.stringify(myPortfolio));
            localStorage.setItem('vibeHistory', JSON.stringify(tradeHistory));
        }

        function renderMarket() {
            const marketContainer = document.getElementById('coin-list');
            marketContainer.innerHTML = "";
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                marketContainer.innerHTML += `
                    <div class="coin-row">
                        <div class="coin-info">
                            <span style="color: #fcd535; font-size: 20px; margin-right: 10px;">${coin.icon}</span> 
                            <strong style="font-size: 18px;">${coin.id}</strong> <span style="color: var(--text-muted); font-size: 13px; margin-left: 5px;">${coin.name}</span>
                        </div>
                        <div class="coin-price mono-num" id="price-${coin.id}">$${coin.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</div>
                        <div class="coin-actions">
                            <button class="btn btn-buy" onclick="buyCoin('${coin.id}')">BUY</button>
                            <button class="btn btn-sell" onclick="sellCoin('${coin.id}')">SELL</button>
                        </div>
                    </div>`;
            }
        }

        function renderPortfolio() {
            const portContainer = document.getElementById('my-crypto-list');
            portContainer.innerHTML = "";
            let hasCoins = false;
            for (const [coinId, amount] of Object.entries(myPortfolio)) {
                if (amount > 0.00001) {
                    hasCoins = true;
                    portContainer.innerHTML += `<div class="portfolio-item"><span style="color: var(--text-muted); font-weight: bold;">${coinId}</span><strong>${amount.toFixed(4)}</strong></div>`;
                }
            }
            if (!hasCoins) portContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px;">No assets held.</p>`;
        }

        function renderHistory() {
            const histContainer = document.getElementById('history-display');
            histContainer.innerHTML = "";
            if (tradeHistory.length === 0) {
                histContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px;">No recent trades.</p>`;
                return;
            }
            tradeHistory.forEach(item => {
                const colorClass = item.type === 'BUY' ? 'log-buy' : 'log-sell';
                histContainer.innerHTML += `
                    <div class="log-entry">
                        <div><span class="${colorClass}">${item.type}</span> <span class="mono-num" style="margin-left: 8px;">${item.amount.toFixed(4)} ${item.coin}</span></div>
                        <div class="log-time mono-num">${item.time}</div>
                    </div>
                `;
            });
        }

        function updatePrices() {
            for (let i = 0; i < coins.length; i++) {
                let oldPrice = coins[i].price;
                let swing = 1 + (Math.random() * 0.04 - 0.02);
                coins[i].price = oldPrice * swing;

                let priceElement = document.getElementById(`price-${coins[i].id}`);
                if (priceElement) {
                    priceElement.innerText = "$" + coins[i].price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });

                    priceElement.classList.remove('price-up', 'price-down');
                    if (coins[i].price > oldPrice) {
                        priceElement.classList.add('price-up');
                    } else {
                        priceElement.classList.add('price-down');
                    }
                }
            }
            // Update the live net worth while prices change
            updateNetWorth();
        }   
  
       setInterval(updatePrices, 5000);

        // Initialize UI
        updateTopUI();
        renderMarket();
        renderPortfolio();
        renderHistory();                           
        updateNetWorth(); // initial calculation                                      
    </script>
</body>             

</html>
