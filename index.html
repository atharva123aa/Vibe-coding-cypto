!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrade Terminal Pro</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto+Mono:wght@500;700&display=swap"
        rel="stylesheet"<>

    <style>
        :root {
            --bg-color: #0b0e11;
            --panel-bg: #181a20;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --accent-green: #0ecb81;
            --accent-red: #f6465d;
            --border-color: #2b3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .mono-num {
            font-family: 'Roboto Mono', monospace;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }

        .logo h2 {
            margin-bottom: 40px;
            font-size: 24px;
            color: #fcd535;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-links li.active {
            background-color: #2b3139;
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .wallet-widget {
            text-align: right;
        }

        .wallet-widget span {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .wallet-widget h2 {
            color: var(--accent-green);
            font-size: 32px;
            margin-top: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .panel h3 {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-buy {
            background: var(--accent-green);
            color: #000;
            margin-right: 5px;
        }

        .btn-sell {
            background: var(--accent-red);
            color: #fff;
        }

        .portfolio-item {
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        /* HISTORY STYLING - spent way too much time on this part */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 13px;
        }

        /* custom scrollbar because the default one is ugly */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }

        .log-buy {
            color: var(--accent-green);
        }

        .log-sell {
            color: var(--accent-red);
        }
    </style>
</head>

<body>
    <div class="app-container">

        <aside class="sidebar">
            <div class="logo">
                <h2>⚡ VibeTrade</h2>
            </div>
            <ul class="nav-links">
                <li class="active">📊 Terminal</li>
                <li>💼 Portfolio</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 style="font-size: 20px;">Trading Dashboard</h1>
                    <p style="color: var(--text-muted); font-size: 13px;">Market Session: Active</p>
                </div>
                <div class="wallet-widget">
                    <span>Available Balance</span>
                    <h2 id="usd-balance" class="mono-num">$0.00</h2>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="panel">
                    <h3>Market Pairs</h3>
                    <div id="coin-list"></div>
                </div>

                <div id="right-col">
                    <div class="panel">
                        <h3>Your Assets 🎒</h3>
                        <div id="my-crypto-list" class="mono-num"></div>
                    </div>

                    <div class="panel">
                        <h3>Recent Activity 📜</h3>
                        <div id="history-display" class="history-list">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const coins = [
            { id: 'BTC', name: 'Bitcoin', price: 62000.50, icon: '₿' },
            { id: 'ETH', name: 'Ethereum', price: 3400.25, icon: '♦' },
            { id: 'SOL', name: 'Solana', price: 145.80, icon: '☀️' },
            { id: 'DOGE', name: 'Dogecoin', price: 0.15, icon: '🐕' }
        ];

        let userBalance = parseFloat(localStorage.getItem('vibeBalance')) || 10000.00;
        let myPortfolio = JSON.parse(localStorage.getItem('vibePortfolio')) || { BTC: 0, ETH: 0, SOL: 0, DOGE: 0 };

        // Load history from storage or start fresh
        let tradeHistory = JSON.parse(localStorage.getItem('vibeHistory')) || [];

        function updateTopUI() {
            document.getElementById('usd-balance').innerText = "$" + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2 });
        }

        // --- THE NEW LOGGING LOGIC ---
        function addToHistory(type, amount, coin, price) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

            const entry = {
                type: type, // "BUY" or "SELL"
                amount: amount,
                coin: coin,
                price: price,
                time: timeStr
            };

            // add to the beginning of the array so newest is first
            tradeHistory.unshift(entry);

            // keep only the last 20 trades so we don't blow up localStorage
            if (tradeHistory.length > 20) tradeHistory.pop();

            saveData();
            renderHistory();
        }

        function renderHistory() {
            const histContainer = document.getElementById('history-display');
            histContainer.innerHTML = "";

            tradeHistory.forEach(item => {
                const colorClass = item.type === 'BUY' ? 'log-buy' : 'log-sell';
                histContainer.innerHTML += `
                    <div class="log-entry">
                        <span class="${colorClass}"><strong>${item.type}</strong> ${item.coin}</span>
                        <span class="mono-num" style="color:var(--text-muted)">${item.time}</span>
                    </div>
                `;
            });
        }

        function buyCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let spendAmount = prompt(`Buy ${targetCoin.id}: How much USD?`);
            spendAmount = parseFloat(spendAmount);

            if (isNaN(spendAmount) || spendAmount <= 0 || spendAmount > userBalance) return alert("Invalid trade.");

            let cryptoReceived = spendAmount / targetCoin.price;
            userBalance -= spendAmount;
            myPortfolio[coinId] += cryptoReceived;

            addToHistory("BUY", cryptoReceived, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
        }

        function sellCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let sellAmount = prompt(`Sell ${targetCoin.id}: How much crypto?`);
            sellAmount = parseFloat(sellAmount);

            if (isNaN(sellAmount) || sellAmount <= 0 || sellAmount > myPortfolio[coinId]) return alert("Invalid trade.");

            let usdGained = sellAmount * targetCoin.price;
            userBalance += usdGained;
            myPortfolio[coinId] -= sellAmount;

            addToHistory("SELL", sellAmount, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
        }

        function saveData() {
            localStorage.setItem('vibeBalance', userBalance);
            localStorage.setItem('vibePortfolio', JSON.stringify(myPortfolio));
            localStorage.setItem('vibeHistory', JSON.stringify(tradeHistory));
        }

        function renderMarket() {
            const marketContainer = document.getElementById('coin-list');
            marketContainer.innerHTML = "";
            coins.forEach(coin => {
                marketContainer.innerHTML += `
                    <div class="coin-row">
                        <div>
                            <span style="color:#fcd535; margin-right:8px">${coin.icon}</span>
                            <strong>${coin.id}</strong>
                        </div>
                        <div class="mono-num">$${coin.price.toLocaleString()}</div>
                        <div>
                            <button class="btn btn-buy" onclick="buyCoin('${coin.id}')">BUY</button>
                            <button class="btn btn-sell" onclick="sellCoin('${coin.id}')">SELL</button>
                        </div>
                    </div>`;
            });
        }

        function renderPortfolio() {
            const portContainer = document.getElementById('my-crypto-list');
            portContainer.innerHTML = "";
            let empty = true;
            for (const [id, amt] of Object.entries(myPortfolio)) {
                if (amt > 0.000001) {
                    empty = false;
                    portContainer.innerHTML += `<div class="portfolio-item"><span>${id}</span> <strong>${amt.toFixed(4)}</strong></div>`;
                }
            }
            if (empty) portContainer.innerHTML = "<p style='color:var(--text-muted); font-size:12px'>Empty Wallet</p>";
        }

        // Initialize everything
        updateTopUI();
        renderMarket();
        renderPortfolio();
        renderHistory();
    </script>
</body </html>
