<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecoding Trader Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --sidebar-bg: #1e2b3c;
            --text-main: #333;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            color: white;
            padding: 20px;
        }

        .logo h2 {
            margin-bottom: 40px;
            font-size: 24px;
            color: var(--accent-green);
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 15px 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .nav-links li:hover,
        .nav-links li.active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .wallet-widget {
            text-align: right;
        }

        .wallet-widget h2 {
            color: var(--accent-green);
            font-size: 28px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .market-panel,
        .portfolio-panel {
            background: var(--card-bg);
            padDing: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .coin-row:last-child {
            border-bottom: none;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-buy {
            background: var(--accent-green);
            color: white;
        }

        .btn-sell {
            background: var(--accent-red);
            color: white;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>🚀 VibeTrade</h2>
            </div>
            <ul class="nav-links">
                <li class="active">📊 Dashboard</li>
                <li>💼 My Portfolio</li>
                <li>📜 History</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="greeting">
                    <h1>Welcome back, Trader</h1>
                    <p>Let's make some fake money today.</p>
                </div>
                <div class="wallet-widget">
                    <span>Buying Power:</span>
                    <h2 id="usd-balance">$0.00</h2>
                </div>
            </header>
            <section class="dashboard-grid">
                <div class="market-panel">
                    <h3>Live Market</h3>
                    <div id="coin-list" class="coin-list">
                    </div>
                </div>
                <div class="portfolio-panel">
                    <h3>My Bags 🎒</h3>
                    <div id="my-crypto-list">
                        <p>You are broke. Buy something.</p>
                    </div>
                    <div class="net-worth">
                        <h4 style="margin-top: 15px;">Total Net Worth: <span id="net-worth-display">$0.00</span></h4>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Array of objects makes it way easier to add new coins later
        const coins = [
            { id: 'BTC', name: 'Bitcoin', price: 62000.50, icon: '₿' },
            { id: 'ETH', name: 'Ethereum', price: 3400.25, icon: '♦' },
            { id: 'SOL', name: 'Solana', price: 145.80, icon: '☀️' },
            { id: 'DOGE', name: 'Dogecoin', price: 0.15, icon: '🐕' }
        ];

        // Setup the User State
        let userBalance = localStorage.getItem('vibeBalance');

        if (userBalance === null) {
            userBalance = 10000.00;
            localStorage.setItem('vibeBalance', userBalance);
            console.log("New user detected. Deposited $10,000.");
        } else {
            userBalance = parseFloat(userBalance);
        }

        // Update the top header UI
        document.getElementById('usd-balance').innerText = "$" + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // Render the Market dynamically
        function renderMarket() {
            const marketContainer = document.getElementById('coin-list');
            marketContainer.innerHTML = ""; // clear the area

            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                marketContainer.innerHTML += `
                    <div class="coin-row" id="row-${coin.id}">
                        <div class="coin-info">
                            <span style="font-size: 20px;">${coin.icon}</span>
                            <strong>${coin.name} (${coin.id})</strong>
                        </div>
                        <div class="coin-price">
                            <span id="price-${coin.id}">$${coin.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                        </div>
                        <div class="coin-actions">
                            <button class="btn btn-buy" onclick="alert('Buy logic coming in Hour 5')">Buy</button>
                            <button class="btn btn-sell" onclick="alert('Sell logic not written yet')">Sell</button>
                        </div>
                    </div>
                `;
            }
        }

        // Run the render function on load
        renderMarket();
    </script>
</body>

</html>
