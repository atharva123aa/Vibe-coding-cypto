<!DOCTYPE html>
<html lang="en">

<head>     
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrade Terminal Pro</title>  
    <link            
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <style>                                       
        /* PRO TRADER DARK MODE VARIABLES */
        :root {          
            --bg-color: #0b0e11;
            /* Binance dark vibe */
            --panel-bg: #181a20;
            --text-main: #eaecef;  
            --text-muted: #848e9c;                         
            --accent-green: #0ecb81;                    
            /* Neon green */     
            --accent-red: #f6465d;
            /* Neon red */
            --border-color: #2b3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Number font class to make money look legit */
        .mono-num {
            font-family: 'JetBrains Mono', monospace;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }

        .logo h2 {
            margin-bottom: 40px;
            font-size: 24px;
            color: #fcd535;
            /* crypto gold */
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-links li:hover,
        .nav-links li.active {
            background-color: #2b3139;
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .wallet-widget {
            text-align: right;
        }

        .wallet-widget span {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Make the balance huge */
        .wallet-widget h2 {
            color: var(--text-main);
            font-size: 32px;
            margin-top: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .panel h3 {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .coin-row:last-child {
            border-bottom: none;
        }

        .coin-price {
            font-size: 18px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-buy {
            background: var(--accent-green);
            color: #000;
        }

        /* black text on neon green looks pro */
        .btn-sell {
            background: var(--accent-red);
            color: #fff;
        }

        .portfolio-item {
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="app-container">

        <aside class="sidebar">
            <div class="logo">
                <h2>⚡ VibeTrade</h2>
            </div>
            <ul class="nav-links">
                <li class="active">📊 Market Data</li>
                <li>💼 Spot Wallet</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="greeting">
                    <h1 style="font-size: 20px;">Terminal Overview</h1>
                    <p style="color: #848e9c; font-size: 14px; margin-top: 5px;">Status: Online & Connected</p>
                </div>
                <div class="wallet-widget">
                    <span>Available USD</span>
                    <h2 id="usd-balance" class="mono-num">$0.00</h2>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="panel">
                    <h3>Live Markets</h3>
                    <div id="coin-list" class="coin-list"></div>
                </div>

                <div class="panel">
                    <h3>Spot Portfolio 🎒</h3>
                    <div id="my-crypto-list" class="mono-num"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const coins = [
            { id: 'BTC', name: 'Bitcoin', price: 62000.50, icon: '₿' },
            { id: 'ETH', name: 'Ethereum', price: 3400.25, icon: '♦' },
            { id: 'SOL', name: 'Solana', price: 145.80, icon: '☀️' },
            { id: 'DOGE', name: 'Dogecoin', price: 0.15, icon: '🐕' }
        ];

        var userBalance = parseFloat(localStorage.getItem('vibeBalance')) || 10000.00; // using var because why not
        let myPortfolio = JSON.parse(localStorage.getItem('vibePortfolio')) || { BTC: 0, ETH: 0, SOL: 0, DOGE: 0 };

        function updateTopUI() {
            document.getElementById('usd-balance').innerText = "$" + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // --- BUY LOGIC ---
        function buyCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let spendAmount = prompt(`How much USD do you want to spend on ${targetCoin.name}?`);
            spendAmount = parseFloat(spendAmount);

            // checking for idiots
            if (isNaN(spendAmount) || spendAmount <= 0) return alert("Error: Invalid Amount.");
            if (spendAmount > userBalance) return alert("Error: Insufficient USD Balance.");

            let cryptoReceived = spendAmount / targetCoin.price;
            userBalance -= spendAmount;
            myPortfolio[coinId] += cryptoReceived;

            saveData();
            updateTopUI();
            renderPortfolio();
        }

        // --- NEW SELL LOGIC (Hour 6) ---
        // basically copied the buy logic but reversed the math
        function sellCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);

            // show them how much they actually own in the prompt so they don't guess
            let currentBag = myPortfolio[coinId].toFixed(4);
            let sellAmount = prompt(`Selling ${targetCoin.id}. You own ${currentBag}.\nHow much crypto do you want to sell?`);

            sellAmount = parseFloat(sellAmount);

            // error checks
            if (isNaN(sellAmount) || sellAmount <= 0) return alert("Error: Invalid Amount.");
            if (sellAmount > myPortfolio[coinId]) return alert("Error: Insufficient Crypto Balance.");

            // calculate USD gained
            let usdGained = sellAmount * targetCoin.price;

            // update bags (plus USD, minus crypto)
            userBalance += usdGained;
            myPortfolio[coinId] -= sellAmount;

            saveData();
            updateTopUI();
            renderPortfolio();
        }

        function saveData() {
            localStorage.setItem('vibeBalance', userBalance);
            localStorage.setItem('vibePortfolio', JSON.stringify(myPortfolio));
            console.log("Bags saved to local storage!"); // forgot to remove this lol
        }

        function renderMarket() {
            const marketContainer = document.getElementById('coin-list');
            marketContainer.innerHTML = "";
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                marketContainer.innerHTML += `
                    <div class="coin-row">
                        <div class="coin-info">
                            <span style="color: #fcd535; font-size: 18px; margin-right: 10px;">${coin.icon}</span> 
                            <strong>${coin.id}</strong> <span style="color: var(--text-muted); font-size: 12px; margin-left: 5px;">${coin.name}</span>
                        </div>
                        <div class="coin-price mono-num">$${coin.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                        <div class="coin-actions">
                            <button class="btn btn-buy" onclick="buyCoin('${coin.id}')">BUY</button>
                            <button class="btn btn-sell" onclick="sellCoin('${coin.id}')">SELL</button>
                        </div>
                    </div>`;
            }
        }

        function renderPortfolio() {
            const portContainer = document.getElementById('my-crypto-list');
            portContainer.innerHTML = "";
            let hasCoins = false;

            // TODO: Add a button to clear all assets if I go broke

            for (const [coinId, amount] of Object.entries(myPortfolio)) {
                // only show coins if we actually own some
                if (amount > 0.00001) {
                    hasCoins = true;
                    portContainer.innerHTML += `
                        <div class="portfolio-item">
                            <span style="color: var(--text-muted);">${coinId}</span>
                            <strong>${amount.toFixed(4)}</strong>
                        </div>`;
                }
            }

            // show a placeholder if portfolio is empty
            if (!hasCoins) {
                portContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px;">No assets held.</p>`;
            }
        }

        // Run on load
        updateTopUI();
        renderMarket();
        renderPortfolio();
    </script>
</body>

</html>
