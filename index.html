<!DOCTYPE html>
<html lang="en">
<!-- my crypto paper trading app - started 2026 -->
<!-- TODO: maybe split this into separate files later -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrade Terminal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        /* main styles - kinda messy but works */
        :root {
            --bg-color: #0b0e11;
            --panel-bg: #181a20;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --accent-green: #0ecb81;
            --accent-red: #f6465d;
            --border-color: #2b3139;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .mono-num {
            font-family: 'JetBrains Mono', monospace;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }

        .logo h2 {
            margin-bottom: 40px;
            font-size: 24px;
            color: #fcd535;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .nav-links li:hover,
        .nav-links li.active {
            background-color: #2b3139;
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .wallet-widget {
            text-align: right;
        }

        .wallet-widget span {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wallet-widget h2 {
            color: var(--text-main);
            font-size: 32px;
            margin-top: 5px;
        }


        .panel {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .panel h3 {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .chart-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin-bottom: 10px;
        }

        .net-worth-badge {
            float: right;
            color: #fcd535;
            font-size: 18px;
            background: rgba(252, 213, 53, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .coin-list-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .coin-list-container::-webkit-scrollbar {
            width: 6px;
        }

        .coin-list-container::-webkit-scrollbar-thumb {
            background: #3a414a;
            border-radius: 10px;
        }

        .coin-list-container::-webkit-scrollbar-track {
            background: var(--panel-bg);
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .coin-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .coin-price {
            font-size: 18px;
            font-weight: bold;
        }

        .price-up {
            color: var(--accent-green) !important;
            text-shadow: 0 0 8px rgba(14, 203, 129, 0.3);
        }

        .price-down {
            color: var(--accent-red) !important;
            text-shadow: 0 0 8px rgba(246, 70, 93, 0.3);
        }

        .badge {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: bold;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .badge-l1 {
            background: rgba(14, 203, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .badge-meme {
            background: rgba(246, 70, 93, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .badge-alt {
            background: rgba(252, 213, 53, 0.1);
            color: #fcd535;
            border: 1px solid #fcd535;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn:hover {
            opacity: 0.85;
        }



        .btn-buy {
            background: var(--accent-green);
            color: #000;
            margin-right: 8px;
        }

        .btn-sell {
            background: var(--accent-red);
            color: #fff;
        }

        .portfolio-item {
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portfolio-item:last-child {
            border-bottom: none;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 13px;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #3a414a;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-track {
            background: var(--panel-bg);
        }

        .log-entry {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-buy {
            color: var(--accent-green);
            font-weight: bold;
        }

        .log-sell {
            color: var(--accent-red);
            font-weight: bold;
        }

        .log-time {
            color: var(--text-muted);
            font-size: 11px;
            background: #0b0e11;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank-me {
            color: var(--accent-green);
            font-weight: bold;
            background: rgba(14, 203, 129, 0.05);
            padding: 8px;
            border-radius: 6px;
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>⚡ VibeTrade</h2>
            </div>
            <ul class="nav-links">
                <li class="active" id="nav-dashboard" onclick="switchTab('dashboard')">📊 Market Data</li>
                <li id="nav-performance" onclick="switchTab('performance')">📈 Performance</li>
                <li id="nav-portfolio" onclick="switchTab('portfolio')">💼 Spot Portfolio</li>
                <li id="nav-activity" onclick="switchTab('activity')">📜 Recent Activity</li>
                <li id="nav-leaderboard" onclick="switchTab('leaderboard')">🏆 Leaderboard</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="greeting">
                    <h1 style="font-size: 22px;">Terminal Overview</h1>
                    <p style="color: var(--accent-green); font-size: 14px; margin-top: 5px;">● Live Market Feed</p>
                </div>
                <div class="wallet-widget">
                    <span>Available USD</span>
                    <h2 id="usd-balance" class="mono-num">$0.00</h2>
                </div>
            </header>

            <section id="dashboard-view">
                <div class="panel">
                    <h3>Live Markets</h3>
                    <div class="coin-list-container" id="coin-list"></div>
                </div>
            </section>

            <section id="performance-view" style="display: none;">
                <div class="panel">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Performance 📈</h3>
                        <button class="btn" style="background: var(--border-color); color: var(--text-main);"
                            onclick="switchTab('dashboard')">← Back</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="nwChart"></canvas>
                    </div>
                </div>
            </section>

            <section id="portfolio-view" style="display: none;">
                <div class="panel">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Spot Portfolio 🎒 <span id="net-worth-display" class="net-worth-badge mono-num">$0.00</span>
                        </h3>
                        <button class="btn" style="background: var(--border-color); color: var(--text-main);"
                            onclick="switchTab('dashboard')">← Back</button>
                    </div>
                    <div id="my-crypto-list" class="mono-num"></div>
                </div>
            </section>

            <section id="activity-view" style="display: none;">
                <div class="panel">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Activity 📜</h3>
                        <button class="btn" style="background: var(--border-color); color: var(--text-main);"
                            onclick="switchTab('dashboard')">← Back</button>
                    </div>
                    <div id="history-display" class="history-list"></div>
                </div>
            </section>

            <section id="leaderboard-view" style="display: none;">
                <div class="panel">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Global Leaderboard 🏆</h3>
                        <button class="btn" style="background: var(--border-color); color: var(--text-main);"
                            onclick="switchTab('dashboard')">← Back</button>
                    </div>
                    <div id="leaderboard-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function switchTab(tabId) {
            document.getElementById('dashboard-view').style.display = (tabId === 'dashboard') ? 'block' : 'none';
            document.getElementById('leaderboard-view').style.display = (tabId === 'leaderboard') ? 'block' : 'none';
            document.getElementById('performance-view').style.display = (tabId === 'performance') ? 'block' : 'none';
            document.getElementById('portfolio-view').style.display = (tabId === 'portfolio') ? 'block' : 'none';
            document.getElementById('activity-view').style.display = (tabId === 'activity') ? 'block' : 'none';

            document.getElementById('nav-dashboard').classList.toggle('active', tabId === 'dashboard');
            document.getElementById('nav-leaderboard').classList.toggle('active', tabId === 'leaderboard');
            document.getElementById('nav-performance').classList.toggle('active', tabId === 'performance');
            document.getElementById('nav-portfolio').classList.toggle('active', tabId === 'portfolio');
            document.getElementById('nav-activity').classList.toggle('active', tabId === 'activity');
        }

        var coins = [
            { id: 'BTC', name: 'Bitcoin', price: 62000.50, icon: '₿', type: 'L1' },
            { id: 'ETH', name: 'Ethereum', price: 3400.25, icon: '♦', type: 'L1' },
            { id: 'SOL', name: 'Solana', price: 145.80, icon: '☀️', type: 'L1' },
            { id: 'XRP', name: 'Ripple', price: 0.55, icon: '✕', type: 'ALT' },
            { id: 'ADA', name: 'Cardano', price: 0.45, icon: '₳', type: 'L1' },
            { id: 'DOGE', name: 'Dogecoin', price: 0.15, icon: '🐕', type: 'MEME' },
            { id: 'SHIB', name: 'Shiba Inu', price: 0.000025, icon: '🐶', type: 'MEME' },
            { id: 'PEPE', name: 'Pepe', price: 0.000008, icon: '🐸', type: 'MEME' },
            { id: 'FLOKI', name: 'Floki', price: 0.0002, icon: '🛡️', type: 'MEME' }
        ];

        var bots = [
            { name: 'Satoshi_Nakamoto', worth: 85400.00 },
            { name: 'Vir jahaser', worth: 15420.50 },
            { name: 'Donald duck', worth: 11200.75 },
            { name: 'Papery', worth: 2100.10 }
        ];

        let userBalance = parseFloat(localStorage.getItem('vibeBalance')) || 10000.00;
        let savedPortfolio = JSON.parse(localStorage.getItem('vibePortfolio')) || {};

        let myPortfolio = {};
        coins.forEach(function (c) { myPortfolio[c.id] = savedPortfolio[c.id] || 0; });
        let tradeHistory = JSON.parse(localStorage.getItem('vibeHistory')) || [];

        let nwHistory = JSON.parse(localStorage.getItem('vibeNwHistory')) || [10000];
        let chartLabels = JSON.parse(localStorage.getItem('vibeChartLabels')) || ['Start'];

        var ctx = document.getElementById('nwChart').getContext('2d');
        let nwChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: nwHistory,
                    borderColor: '#0ecb81',
                    backgroundColor: 'rgba(14, 203, 129, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: {
                        display: true,
                        grid: { color: '#2b3139' },
                        ticks: { color: '#848e9c', font: { family: 'JetBrains Mono' } }
                    }
                }
            }
        });

        function updateTopUI() {
            document.getElementById('usd-balance').innerText = "$" + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderLeaderboard(myNetWorth) {
            let allTraders = [...bots, { name: 'YOU', worth: myNetWorth, isMe: true }];
            allTraders.sort(function (a, b) { return b.worth - a.worth; });

            var lbContainer = document.getElementById('leaderboard-list');
            lbContainer.innerHTML = "";

            allTraders.forEach(function (trader, index) {
                let rank = index + 1;
                let isMeClass = trader.isMe ? 'rank-me' : '';
                let icon = rank === 1 ? '👑' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : '👤'));

                lbContainer.innerHTML += `
                    <div class="leaderboard-item ${isMeClass}">
                        <div>
                            <span style="margin-right: 10px; font-size: 16px;">${icon}</span> 
                            <strong>#${rank}</strong> 
                            <span style="margin-left: 5px; color: ${trader.isMe ? 'var(--accent-green)' : 'var(--text-muted)'};">${trader.name}</span>
                        </div>
                        <div class="mono-num">$${trader.worth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    </div>
                `;
            });
        }

        function updateNetWorth() {
            let totalCryptoValue = 0;
            for (var [coinId, amount] of Object.entries(myPortfolio)) {
                var currentCoin = coins.find(function (c) { return c.id === coinId; });
                if (currentCoin && amount > 0) {
                    totalCryptoValue += (amount * currentCoin.price);
                }
            }
            let netWorth = userBalance + totalCryptoValue;
            document.getElementById('net-worth-display').innerText = "$" + netWorth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            renderLeaderboard(netWorth);

            // HOUR 17: Push live data to chart
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');

            nwHistory.push(netWorth);
            chartLabels.push(timeStr);

            // Keep max 20 data points so it scrolls
            if (nwHistory.length > 20) {
                nwHistory.shift();
                chartLabels.shift();
            }

            nwChart.update();

            localStorage.setItem('vibeNwHistory', JSON.stringify(nwHistory));
            localStorage.setItem('vibeChartLabels', JSON.stringify(chartLabels));
        }

        function addToHistory(type, amount, coinId, price) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            const entry = { type: type, amount: amount, coin: coinId, price: price, time: timeStr };

            tradeHistory.unshift(entry);
            if (tradeHistory.length > 30) tradeHistory.pop();

            saveData();
            renderHistory();
        }

        function buyCoin(coinId) {
            var targetCoin = coins.find(function (c) { return c.id === coinId; });
            let spendAmount = prompt(`How much USD do you want to spend on ${targetCoin.name} at $${targetCoin.price.toFixed(6)}?`);

            spendAmount = parseFloat(spendAmount);
            if (isNaN(spendAmount) || spendAmount <= 0 || spendAmount > userBalance) {
                alert("Not enough balance bro"); return;
            }

            let cryptoReceived = spendAmount / targetCoin.price;
            userBalance -= spendAmount;
            myPortfolio[coinId] += cryptoReceived;

            addToHistory("BUY", cryptoReceived, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
            updateNetWorth();
        }

        function sellCoin(coinId) {
            let targetCoin = coins.find(c => c.id === coinId);
            let currentBag = myPortfolio[coinId].toLocaleString('en-US', { maximumFractionDigits: 6 });
            let sellAmount = prompt(`Selling ${targetCoin.id} at $${targetCoin.price.toFixed(6)}.\nYou own ${currentBag}. How much to sell?`);

            sellAmount = parseFloat(sellAmount);
            if (isNaN(sellAmount) || sellAmount <= 0 || sellAmount > myPortfolio[coinId]) {
                alert(" You dont have that much"); return;

            }

            let usdGained = sellAmount * targetCoin.price;
            userBalance += usdGained;
            myPortfolio[coinId] -= sellAmount;

            addToHistory("SELL", sellAmount, coinId, targetCoin.price);
            saveData();
            updateTopUI();
            renderPortfolio();
            updateNetWorth();
        }

        function saveData() {
            localStorage.setItem('vibeBalance', userBalance);
            localStorage.setItem('vibePortfolio', JSON.stringify(myPortfolio));
            localStorage.setItem('vibeHistory', JSON.stringify(tradeHistory));
        }

        function getBadgeHTML(type) {
            if (type === 'L1') return `<span class="badge badge-l1">L1</span>`;
            if (type === 'MEME') return `<span class="badge badge-meme">MEME</span>`;
            return `<span class="badge badge-alt">ALT</span>`;
        }

        function renderMarket() {
            var marketContainer = document.getElementById('coin-list');
            marketContainer.innerHTML = "";
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                marketContainer.innerHTML += `
                    <div class="coin-row">
                        <div class="coin-info">
                            <span style="color: #fcd535; font-size: 20px; margin-right: 10px;">${coin.icon}</span> 
                            <strong style="font-size: 18px;">${coin.id}</strong> 
                            ${getBadgeHTML(coin.type)}
                        </div>
                        <div class="coin-price mono-num" id="price-${coin.id}">$${coin.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</div>
                        <div class="coin-actions">
                            <button class="btn btn-buy" onclick="buyCoin('${coin.id}')">BUY</button>
                            <button class="btn btn-sell" onclick="sellCoin('${coin.id}')">SELL</button>
                        </div>
                    </div>`;
            }
        }

        function renderPortfolio() {
            const portContainer = document.getElementById('my-crypto-list');
            portContainer.innerHTML = "";
            let hasCoins = false;

            for (const [coinId, amount] of Object.entries(myPortfolio)) {
                if (amount > 0.000001) {
                    hasCoins = true;
                    portContainer.innerHTML += `<div class="portfolio-item"><span style="color: var(--text-muted); font-weight: bold;">${coinId}</span><strong>${amount.toLocaleString('en-US', { maximumFractionDigits: 6 })}</strong></div>`;
                }
            }
            if (!hasCoins) portContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px;">No assets held.</p>`;
        }

        function renderHistory() {
            const histContainer = document.getElementById('history-display');
            histContainer.innerHTML = "";
            if (tradeHistory.length === 0) {
                histContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 20px;">No recent trades.</p>`;
                return;
            }

            tradeHistory.forEach(function (item) {
                const colorClass = item.type === 'BUY' ? 'log-buy' : 'log-sell';
                histContainer.innerHTML += `
                    <div class="log-entry">
                        <div><span class="${colorClass}">${item.type}</span> <span class="mono-num" style="margin-left: 8px;">${item.amount.toLocaleString('en-US', { maximumFractionDigits: 4 })} ${item.coin}</span></div>
                        <div class="log-time mono-num">${item.time}</div>
                    </div>
                `;
            });
        }

        function updatePrices() {
            for (let i = 0; i < coins.length; i++) {
                let oldPrice = coins[i].price;
                let swing = 1 + (Math.random() * 0.04 - 0.02);
                coins[i].price = oldPrice * swing;

                let priceElement = document.getElementById(`price-${coins[i].id}`);
                if (priceElement) {
                    priceElement.innerText = "$" + coins[i].price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 });

                    priceElement.classList.remove('price-up', 'price-down');
                    if (coins[i].price > oldPrice) {
                        priceElement.classList.add('price-up');
                    } else {
                        priceElement.classList.add('price-down');
                    }
                }
            }

            bots.forEach(function (bot) {
                bot.worth = bot.worth * (1 + (Math.random() * 0.01 - 0.005));
            });

            updateNetWorth();
        }

        setInterval(updatePrices, 5000);

        updateTopUI();
        renderMarket();
        renderPortfolio();
        renderHistory();
        updateNetWorth();
        console.log('vibetrade loaded, gl trading');
    </script>
</body>

</html>
